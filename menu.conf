# QNAP LCD menu configuration
#
# Two kinds of lines:
#   SETTINGS  ->  KEY = VALUE
#   PAGES     ->  a bare token (one page per line, in display order)
# Lines starting with '#' (or blank lines) are ignored, so comment a line
# out to disable that setting/page.
#
# Settings (with defaults):
#   BACKLIGHT_TIMEOUT = 120   seconds of inactivity before the backlight turns
#                             off; 0 = always on
#   CENTER            = false  center page titles and values on the 16-char line
#   REFRESH_INTERVAL  = 10     seconds between page data refreshes
#   MANAGE_POWERKEY   = true   set systemd-logind HandlePowerKey=ignore at start
#                             so the power button runs our prompt+confirm flow
#                             instead of an instant poweroff (needs root)

BACKLIGHT_TIMEOUT = 120
CENTER = false
REFRESH_INTERVAL = 10
MANAGE_POWERKEY = true

# ---------------------------------------------------------------------------
# Pages
#
# Available tokens:
#   OS_VERSION        TrueNAS version
#   HOSTNAME          hostname + OS/arch
#   UPTIME            uptime
#   LOAD              load averages (1/5/15 min)
#   MEMORY            used / total RAM
#   CPU_TEMP          CPU package temperature
#   FAN_SPEED         chassis fan RPM
#   NET               all active network interfaces (one page each)
#   NET_eth0          a specific interface
#   STORAGE_BOOT      the boot-pool
#   STORAGE_ALL       every zpool (one page each)
#   STORAGE_Tank      a specific pool by name (e.g. STORAGE_Tank-24TB)

OS_VERSION
HOSTNAME
UPTIME
LOAD
MEMORY
CPU_TEMP
FAN_SPEED
NET
STORAGE_BOOT
STORAGE_ALL
